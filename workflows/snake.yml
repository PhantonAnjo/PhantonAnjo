name: Generate Snake Animation

# Este workflow gera a animação da cobrinha (snake) que "come" os seus
# commits no gráfico de contribuições, e publica o SVG na branch "output".
# Usa a action oficial e mantida: Platane/snk

on:
  schedule:
    - cron: "0 0 * * *"   # roda todos os dias à meia-noite (UTC)
  workflow_dispatch: {}    # permite rodar manualmente pela aba Actions
  push:
    branches:
      - main               # roda também sempre que você der push na main

permissions:
  contents: write           # necessário para a action commitar na branch output

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push output to "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}