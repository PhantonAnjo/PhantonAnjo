name: Update Profile Metrics

# Workflow "mestre" do repositório. Gera um card SVG de métricas
# (linguagens mais usadas, calendário isométrico de contribuições, etc)
# usando a action lowlighter/metrics, que é ativamente mantida.
# O resultado é salvo como assets/metrics.svg e pode ser referenciado
# no README (ex: para uma seção extra de estatísticas).
#
# Rode manualmente pela aba "Actions" > "Update Profile Metrics" > "Run workflow"
# ou deixe o cron cuidar da atualização automática.

on:
  schedule:
    - cron: "0 3 * * *"   # roda todos os dias às 03:00 (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update profile metrics [skip ci]"
          config_timezone: America/Sao_Paulo
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year